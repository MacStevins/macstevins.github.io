<!DOCTYPE html>
<title>MacStevins | 404</title>
<style>
@font-face {
	font-family: Roboto;
	src: url('/res/font/robotoRegularLatin.woff')
}

a {
	color: #111
}

body {
	text-align: center;
	margin: auto
}

html {
	background: #fdfcfe;
	display: flex;
	font-family: Roboto;
	min-height: 100dvh
}
</style>
<h2>You seem lost, <a href=/>redirecting you home</a> in <span></span>...</h2>
<script>
(async _ => {
	var c = 5
	while(c > -1) {
		document.getElementsByTagName('span')[0].innerHTML = c
		c--
		await new Promise(r => setTimeout(r, 1000));
	}
	window.location.replace('/')
})()
</script>
